document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flex; align-items:center; gap:12px; margin-bottom:10px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--blue);\">Ossoff<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:56%; height:100%; background:linear-gradient(90deg,var(--blue2),var(--blue)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--blue);\">56<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--red);\">Collins<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:43%; height:100%; background:linear-gradient(90deg,var(--red2),var(--red)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--red);\">43<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:12px;\">\n        <a href=\"https://www.foxnews.com/politics/fox-news-poll-early-look-georgia-senate-race\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:11px; color:var(--faint); text-decoration:none;\">Fox News poll · 1,002 registered voters · ±3 pts →<\u002Fa>\n        <span style=\"font-size:11px; color:var(--faint);\">June 23-27<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Where they stand\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 4px;\">Where they stand<\u002Fh2>\n    <p style=\"font-size:13.5px; color:var(--soft); margin:0 0 14px;\">Tap a topic — including today's big ones.<\u002Fp>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n      <sc-for list=\"{{ topicChips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n        <button type=\"button\" onclick=\"{{ chip.click }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--blue2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:7px;\">OSSOFF SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ joSays }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--red2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:7px;\">COLLINS SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ mcSays }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Money check\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"background:var(--greenbg); border-radius:22px; padding:20px 22px;\">\n      <div style=\"font-size:15px; font-weight:800; color:var(--green); margin-bottom:4px;\">✓ Money &amp; integrity check<\u002Fdiv>\n      <p style=\"font-size:12.5px; color:var(--soft); margin:0 0 12px;\">How each candidate handles money in politics.<\u002Fp>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Ban Congress from trading stocks<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JO yes<\u002Fspan> · <span style=\"color:var(--bad);\">MC no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Takes corporate PAC money<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JO no<\u002Fspan> · <span style=\"color:var(--bad);\">MC yes<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Wants to overturn Citizens United<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JO yes<\u002Fspan> · <span style=\"color:var(--bad);\">MC no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Follow the money: about 53% of Ossoff's haul has come from small-dollar donors ($200 or less); Collins's has leaned more on large checks (35% large-dollar, 25% small-dollar, the rest from committees). <span style=\"color:var(--faint);\">— OpenSecrets, April 2026<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"What they'd do\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their big promises<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">OSSOFF'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Lower health-care costs<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Restore the ACA subsidies whose expiry dropped 350,000 Georgians from coverage; keep the $35 insulin cap and Medicare drug negotiation.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Take on corruption<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Ban senators from trading stocks and overturn Citizens United to limit anonymous money in politics.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Deliver for Georgia<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Keep steering federal money to Georgia farms, infrastructure, and veterans from his Appropriations seat.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">COLLINS'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Back Trump's America First agenda<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Support the administration's deportation program and border enforcement; he authored the Laken Riley Act.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Cut costs by cutting red tape<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Reduce regulations on builders to lower housing costs, and ban corporations from bulk-buying homes.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">A trucker's work ethic in Washington<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Runs as an outsider businessman; backs term limits, school choice, and lower taxes and spending.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Agree or differ\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;\">\n      <h2 style=\"font-weight:800; font-size:21px; margin:0;\">Agree or differ?<\u002Fh2>\n      <div style=\"display:flex; gap:6px;\">\n        <button type=\"button\" onclick=\"{{ setAll }}\" style=\"{{ chipAll }}\">All<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setAgree }}\" style=\"{{ chipAgree }}\">Agree<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setDiffer }}\" style=\"{{ chipDiffer }}\">Differ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-vf=\"{{ voteFilter }}\" style=\"background:var(--card); border-radius:22px; padding:6px 20px; box-shadow:var(--shadow);\">\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Universal background checks for gun sales<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Ossoff: supports, plus red-flag laws · Collins: opposes new firearm restrictions<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Federal clean-energy investment<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Ossoff: expand solar manufacturing and tax credits · Collins: opposes emissions mandates, would ease environmental reviews<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Tougher penalties for human smuggling and trafficking<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Both back stronger enforcement at the border<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Was the 2020 election legitimate?<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Ossoff: yes · Collins: has echoed claims that Georgia's result was rigged<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0;\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Federal support for Georgia farmers<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Ossoff: farm disaster tax relief, crop research funding · Collins: protect farmers from environmental lawsuits<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Their stories\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their stories<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">JON OSSOFF<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">1987<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Born in Atlanta; studied at Georgetown and the London School of Economics.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2013<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Ran an investigative journalism company exposing corruption and war crimes.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2021<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Beat Sen. David Perdue in a runoff to become the Senate's youngest member.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2025<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Ten of his bills became law, including the Federal Prison Oversight Act.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Seeks a second term as the only Democratic senator on the ballot in a Trump-won state.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">MIKE COLLINS<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">1967<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Born in Jackson, Georgia; son of former congressman Mac Collins.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">1992<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Founded Collins Trucking at 25 with one semi-truck; grew it to a 115-truck fleet.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2022<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Elected to the U.S. House from Georgia's 10th district.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2025<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">His Laken Riley Act — requiring detention of migrants charged with theft — signed into law.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won the GOP runoff over Derek Dooley 55.5% after a late Trump endorsement.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"The narrative\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 ref=\"{{ narrativeRef }}\" style=\"{{ narrativeHeadingStyle }}\">The backstory<\u002Fh2>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:14px; font-size:14px; line-height:1.7;\">\n      <p style=\"margin:0;\">Here's the short version: Republicans started this cycle calling Jon Ossoff the most vulnerable Democrat in the country — the only Democratic senator up for re-election in a state Trump won. Georgia was supposed to be their easiest flip.<\u002Fp>\n      <p style=\"margin:0;\">Then the primary got messy. Trump stayed on the sidelines for months while three Republicans fought it out: congressman Mike Collins, congressman Buddy Carter, and former football coach Derek Dooley, who had Governor Kemp's backing. Collins led the first round but nobody hit 50%, forcing a runoff — during which his campaign fired a top aide over an offensive tweet. Trump finally endorsed Collins at the last minute, and he won the runoff comfortably, 55.5%.<\u002Fp>\n      <p style=\"margin:0;\">Meanwhile Ossoff spent the whole year unopposed, raising more money than any Senate candidate in the country — over $60 million, most of it from small donors — while Republicans spent theirs attacking each other. Collins came out of the runoff with about $1.2 million left.<\u002Fp>\n      <p style=\"margin:0;\">So the mood has flipped. Forecasters moved the race from toss-up to leaning Democratic, and the first big general-election poll had Ossoff up 13. Republicans insist a MAGA-friendly state and a midterm environment keep it winnable; Democrats say Collins is too far right for a state this close. There's one more wrinkle: if nobody tops 50% in November, Georgia does it all again in a December runoff.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:720px; margin:0 auto; padding:28px 20px 44px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6;\">\n    Positions summarized from campaign websites, voting records, and news reports · July 2026\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'light', topic: 'Cost of Living', voteFilter: 'all', pulse: false };\n  narrativeRef = React.createRef();\n\n  componentWillUnmount(){\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n  }\n\n  scrollToNarrative = () => {\n    const el = this.narrativeRef.current;\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 24;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n    this._pulseStart = setTimeout(() => {\n      this.setState({ pulse: true });\n      this._pulseEnd = setTimeout(() => this.setState({ pulse: false }), 1300);\n    }, 550);\n  };\n\n  static TOPICS = [\n    { label: 'Cost of Living',\n      jo: 'Blames Trump\\u2019s tariffs, the Iran war, and health-insurance costs for rising rent, power bills, and groceries. Voted to cap insulin at $35/month and let Medicare negotiate drug prices.',\n      mc: 'Says he\\u2019ll make life more affordable by cutting federal red tape \\u2014 fewer regulations on builders and small businesses. Backed the 2025 tax-cut law.' },\n    { label: 'Iran War',\n      jo: 'Opposes the war \\u2014 says it has weakened the economy and national security, and accuses the administration of lying about its justification and progress.',\n      mc: 'Peace through strength: supports military efforts against the Iranian regime, which he calls the largest state sponsor of terror.' },\n    { label: 'Healthcare',\n      jo: 'Restore the ACA subsidies whose expiry dropped ~350,000 Georgians from coverage; supports a public option, not Medicare for All.',\n      mc: 'Blames the Affordable Care Act for rising health-care costs; joined the 2025 law cutting spending on social programs.' },\n    { label: 'Housing',\n      jo: 'Says housing costs are rising under Trump\\u2019s policies; backs federal investment in affordable housing.',\n      mc: 'Cut regulations on builders, speed up building approvals, and ban companies from bulk-buying homes to limit supply.' },\n    { label: 'Immigration',\n      jo: 'Voted for the Laken Riley Act and tougher anti-smuggling penalties, but says his investigations found 1,000+ credible abuse reports in detention facilities.',\n      mc: 'Authored the Laken Riley Act and fully supports the administration\\u2019s deportation program \\u2014 he plans to make immigration his main contrast with Ossoff.' },\n    { label: 'Abortion',\n      jo: 'Supports codifying Roe v. Wade into federal law; opposes Georgia\\u2019s six-week ban and backs protections for contraception and IVF.',\n      mc: 'Describes himself as \"100 percent pro-life, period. No exceptions\" and co-sponsored a bill recognizing personhood at conception.' },\n  ];\n\n  renderVals(){\n    const theme = this.state.theme;\n    const active = Component.TOPICS.find(t => t.label === this.state.topic) || Component.TOPICS[0];\n\n    const chipBase = \"font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; border:none; cursor:pointer;\";\n    const topicChips = Component.TOPICS.map(t => ({\n      label: t.label,\n      style: chipBase + (t.label === active.label\n        ? ' background:var(--ink); color:var(--bg);'\n        : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);'),\n      click: () => this.setState({ topic: t.label }),\n    }));\n\n    const f = this.state.voteFilter;\n    const vChip = (on) => chipBase + (on ? ' background:var(--ink); color:var(--bg);' : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);');\n\n    return {\n      theme,\n      isDark: theme === 'dark',\n      isLight: theme !== 'dark',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n\n      topicChips,\n      joSays: active.jo,\n      mcSays: active.mc,\n\n      voteFilter: f,\n      chipAll: vChip(f === 'all'),\n      chipAgree: vChip(f === 'agree'),\n      chipDiffer: vChip(f === 'differ'),\n      setAll: () => this.setState({ voteFilter: 'all' }),\n      setAgree: () => this.setState({ voteFilter: 'agree' }),\n      setDiffer: () => this.setState({ voteFilter: 'differ' }),\n\n      scrollToNarrative: this.scrollToNarrative,\n      narrativeRef: this.narrativeRef,\n      narrativeHeadingStyle: \"font-weight:800; font-size:21px; margin:0 0 14px; display:inline-block; padding:4px 10px; margin-left:-10px; border-radius:10px;\" + (this.state.pulse ? \" animation:narrativePulse 1.3s ease;\" : \"\"),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
