  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1a98d5168\">\n<link rel=\"alternate icon\" type=\"image/png\" href=\"favicon.png\">\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;}\n  :root{\n    --bg:#F6F4EF; --card:#FFFFFF; --ink:#23201A; --soft:#6B6455; --faint:#A39B89;\n    --chipbg:#E8E3D8; --track:#EFEBE2; --line:#ECE7DC;\n    --blue:#33569E; --bluebg:#DCE7FB; --blue2:#5B82D6;\n    --red:#9E3333; --redbg:#FADCDC; --red2:#D66A5B;\n    --gold:#B4832E; --goldbg:#F7ECD7;\n    --green:#2F6F4E; --greenbg:#EDF5EE; --bad:#B04A38;\n    --shadow:0 6px 18px -12px rgba(35,32,26,.3);\n  }\n  [data-theme=\"dark\"]{\n    --bg:#15171C; --card:#212429; --ink:#F0EDE6; --soft:#A6AAB4; --faint:#6E7280;\n    --chipbg:#2B2E35; --track:#2B2E35; --line:#2E323A;\n    --blue:#9DB8EF; --bluebg:#273349; --blue2:#5B82D6;\n    --red:#E59B8F; --redbg:#3E2A2B; --red2:#C96A57;\n    --gold:#D9B26A; --goldbg:#37301F;\n    --green:#7FD6A4; --greenbg:#1E2F26; --bad:#E28B7B;\n    --shadow:0 8px 22px -12px rgba(0,0,0,.6);\n  }\n  @keyframes barGrow{ from{transform:scaleX(0);} to{transform:scaleX(1);} }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-theme=\"{{ theme }}\" style=\"min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Plus Jakarta Sans',sans-serif; -webkit-font-smoothing:antialiased; transition:background-color .25s ease, color .25s ease;\">\n\n  <div style=\"max-width:720px; margin:0 auto; padding:18px 20px 0; display:flex; align-items:center; justify-content:space-between;\">\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <a href=\"House%20Hub.dc.html\" style=\"font-size:12.5px; font-weight:700; color:var(--soft); text-decoration:none; background:var(--card); padding:9px 16px; border-radius:999px; box-shadow:var(--shadow);\">← All House races<\u002Fa>\n      <span style=\"font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--gold); background:var(--goldbg); padding:4px 8px; border-radius:999px;\">BETA<\u002Fspan>\n    <\u002Fdiv>\n    <button type=\"button\" onclick=\"{{ toggleTheme }}\" aria-label=\"Toggle dark mode\" style=\"width:38px; height:38px; border-radius:50%; border:none; background:var(--card); color:var(--ink); display:flex; align-items:center; justify-content:center; padding:0; cursor:pointer; box-shadow:var(--shadow);\">\n      <sc-if value=\"{{ isDark }}\" hint-placeholder-val=\"{{ false }}\">\n        <svg viewBox=\"0 0 24 24\" style=\"width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\"><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"4.5\"><\u002Fline><line x1=\"12\" y1=\"19.5\" x2=\"12\" y2=\"22\"><\u002Fline><line x1=\"2\" y1=\"12\" x2=\"4.5\" y2=\"12\"><\u002Fline><line x1=\"19.5\" y1=\"12\" x2=\"22\" y2=\"12\"><\u002Fline><line x1=\"4.9\" y1=\"4.9\" x2=\"6.6\" y2=\"6.6\"><\u002Fline><line x1=\"17.4\" y1=\"17.4\" x2=\"19.1\" y2=\"19.1\"><\u002Fline><line x1=\"4.9\" y1=\"19.1\" x2=\"6.6\" y2=\"17.4\"><\u002Fline><line x1=\"17.4\" y1=\"6.6\" x2=\"19.1\" y2=\"4.9\"><\u002Fline><\u002Fsvg>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isLight }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg viewBox=\"0 0 24 24\" style=\"width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\"><path d=\"M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fsc-if>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Hero\" style=\"max-width:720px; margin:0 auto; padding:22px 20px 6px;\">\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;\">\n      <span style=\"display:inline-block; background:var(--chipbg); color:var(--soft); font-size:11.5px; font-weight:700; padding:7px 14px; border-radius:999px;\">🗳 Your ballot · Nov 3, 2026<\u002Fspan>\n      <a href=\"https://vote.org\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; background:var(--goldbg); color:var(--gold); font-size:11.5px; font-weight:800; padding:7px 14px; border-radius:999px; text-decoration:none; white-space:nowrap;\">How to vote →<\u002Fa>\n    <\u002Fdiv>\n    <h1 style=\"font-weight:800; font-size:clamp(28px,6vw,38px); line-height:1.12; letter-spacing:-.02em; margin:16px 0 10px;\">California's 45th - U.S. House<\u002Fh1>\n    <p style=\"font-size:15px; line-height:1.6; color:var(--soft); margin:0; max-width:560px;\">CA-45 is based in Orange and Los Angeles Counties. Contains the largest Vietnamese population outside Vietnam. This&nbsp; seat flipped to Democrats by just 653 votes in 2024.<br><span class=\"box\">🛈&nbsp;<\u002Fspan>CA-45 has been affected by Prop 50 redistricting.<\u002Fp>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Candidates\" style=\"max-width:720px; margin:0 auto; padding:20px 20px 0; display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px;\">\n    <div style=\"background:var(--card); border-radius:22px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);\">\n      <img src=\"ab62a7a4-9e23-424b-9b76-a7051f35ea1b\" alt=\"Derek Tran\" style=\"width:104px; height:104px; margin:0 auto 12px; border-radius:50%; object-fit:cover; display:block; box-shadow:var(--shadow);\">\n      <div style=\"font-weight:800; font-size:18px;\">Derek Tran<\u002Fdiv>\n      <div style=\"display:inline-block; margin-top:7px; background:var(--bluebg); color:var(--blue); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px;\">Democrat - Age: 45 · Incumbent<\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Workers' rights lawyer, Army veteran, and pharmacy owner. Son of Vietnamese refugees.<\u002Fp>\n      <a href=\"https://www.derektranforcongress.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--blue); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);\">\n      <img src=\"183b7f9b-154b-4949-b4f4-af055bbae610\" alt=\"Chuong Vo\" style=\"width:104px; height:104px; margin:0 auto 12px; border-radius:50%; object-fit:cover; display:block; box-shadow:var(--shadow);\">\n      <div style=\"font-weight:800; font-size:18px;\">Chuong Vo<\u002Fdiv>\n      <div style=\"display:inline-block; margin-top:7px; background:var(--redbg); color:var(--red); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px;\">Republican - Age: 50<\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Retired police officer and former mayor of Cerritos. A Vietnamese refugee himself.<\u002Fp>\n      <a href=\"https://www.vo4congress.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--red); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Outlook\" style=\"max-width:720px; margin:0 auto; padding:14px 20px 0;\">\n    <div style=\"background:var(--card); border-radius:22px; padding:20px 20px 22px; box-shadow:var(--shadow);\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; gap:10px; flex-wrap:wrap;\">\n        <span style=\"font-weight:800; font-size:16px;\">Who's ahead?<\u002Fspan>\n        <span style=\"font-size:11px; font-weight:700; color:var(--blue); background:var(--bluebg); padding:5px 12px; border-radius:999px;\">LEAN DEMOCRAT<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.65; color:var(--soft); margin:0;\">There's no public general-election polling here yet, but two signals favor Tran: he took 53.8% in the June 2 all-party primary (Vo finished second at 14.6% of a fragmented Republican field), and California's Prop 50 redistricting added bluer LA County territory to the district. Still, this seat was decided by 653 votes in 2024 — nobody is treating it as safe.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Where they stand\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 4px;\">Where they stand<\u002Fh2>\n    <p style=\"font-size:13.5px; color:var(--soft); margin:0 0 14px;\">Tap a topic that's important to you.<\u002Fp>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n      <sc-for list=\"{{ topicChips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n        <button type=\"button\" onclick=\"{{ chip.click }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--blue2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:7px;\">TRAN SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ dtSays }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--red2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:7px;\">VO SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ cvSays }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Money check\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"background:var(--greenbg); border-radius:22px; padding:20px 22px;\">\n      <div style=\"font-size:15px; font-weight:800; color:var(--green); margin-bottom:4px;\">✓ Money &amp; integrity check<\u002Fdiv>\n      <p style=\"font-size:12.5px; color:var(--soft); margin:0 0 12px;\">How each candidate handles money in politics.<\u002Fp>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Ban Congress from trading stocks<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">DT yes<\u002Fspan> · <span style=\"color: #6E6E7C\">CV unknown<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Supports limits on lobbyist &amp; PAC influence<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">DT yes<\u002Fspan> · <span style=\"color: #6E6E7C\">CV unknown<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Follow the money: Tran entered the general with a $3.9M war chest; Vo raised about $322K through the primary. The 2024 version of this race drew over $34M in total spending. <span style=\"color:var(--faint);\">— FEC filings, March 2026<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Their stories\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their stories<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">DEREK TRAN<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">1980<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Born in LA County to Vietnamese refugees; his father fled Saigon by boat in 1975.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">1999<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Enlisted in the Army at 18; later became a workers' rights attorney and pharmacy owner.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2024<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Unseated Rep. Michelle Steel by 653 votes in one of the country's most expensive House races.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Serves on Armed Services; co-leads the Democrats' National Security Task Force; won the primary with 53.8%.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">CHUONG VO<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">1975+<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Fled communist Vietnam as a refugee; settled in Southern California.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">Career<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Spent his career as a police officer before retiring from law enforcement.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2020<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Elected to the Cerritos City Council; later served as mayor.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won the GOP endorsement over four rivals and advanced from the June 2 primary with 14.6%.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:720px; margin:0 auto; padding:28px 20px 44px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6;\">\n    Positions summarized from campaign websites, voting records, and news reports · July 2026<br>\n    electy.org is in beta — expect rough edges as we build out every race.<br>\n    <a href=\"Contact.dc.html\" style=\"display:inline-block; margin-top:10px; font-size:11.5px; font-weight:800; color:var(--soft); background:var(--card); padding:8px 16px; border-radius:999px; box-shadow:var(--shadow); text-decoration:none;\">Contact us<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'light', topic: 'Cost of Living' };\n\n  static TOPICS = [\n    { label: 'Cost of Living',\n      dt: 'Blames corporate special interests for rising prices; wants to rein in prescription-drug and healthcare costs and end tax breaks for corporate donors.',\n      cv: 'Cut wasteful federal spending, audit fraud and duplication, and apply municipal-style budget discipline instead of raising taxes.' },\n    { label: 'Healthcare',\n      dt: 'Healthcare is a right: as a pharmacy owner he\\u2019s fought insurers and drug companies, and opposed Medicaid cuts.',\n      cv: 'Keep Medicaid and Medicare available while targeting inefficiencies; favors market competition over new programs.' },\n    { label: 'Immigration',\n      dt: 'Defends immigrant communities against mass-deportation raids; supports legal pathways for long-settled families.',\n      cv: 'Secure borders and stronger enforcement, paired with faster asylum and visa processing and no racial profiling.' },\n    { label: 'Little Saigon & China',\n      dt: 'Anti-communist credentials front and center: sanctions on Hanoi\\u2019s rights abusers and a hard line on Beijing.',\n      cv: '\"We fled a communist party to come here for American values\" \\u2014 runs on his refugee story and a hawkish China stance.' },\n    { label: 'Public Safety',\n      dt: 'Fund local police and community anti-hate programs; toughen penalties for retail theft rings.',\n      cv: 'A retired officer: more police funding, tougher sentencing, and backing law enforcement without apology.' },\n    { label: 'Social Security',\n      dt: 'No cuts — introduced a bill to reinstate veterans fired in federal layoffs and opposes benefit reductions.',\n      cv: 'Protect Social Security and Medicare while trimming inefficiencies to preserve solvency.' },\n  ];\n\n  renderVals(){\n    const theme = this.state.theme;\n    const active = Component.TOPICS.find(t => t.label === this.state.topic) || Component.TOPICS[0];\n\n    const chipBase = \"font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; border:none; cursor:pointer;\";\n    const topicChips = Component.TOPICS.map(t => ({\n      label: t.label,\n      style: chipBase + (t.label === active.label\n        ? ' background:var(--ink); color:var(--bg);'\n        : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);'),\n      click: () => this.setState({ topic: t.label }),\n    }));\n\n    return {\n      theme,\n      isDark: theme === 'dark',\n      isLight: theme !== 'dark',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n      topicChips,\n      dtSays: active.dt,\n      cvSays: active.cv,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
