  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

.5px; font-weight:700; color:var(--soft); text-decoration:none; background:var(--card); padding:9px 16px; border-radius:999px; box-shadow:var(--shadow);\">← All Senate races<\u002Fa>\n      <span style=\"font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--gold); background:var(--goldbg); padding:4px 8px; border-radius:999px;\">BETA<\u002Fspan>\n    <\u002Fdiv>\n    <button type=\"button\" onclick=\"{{ toggleTheme }}\" aria-label=\"Toggle dark mode\" style=\"width:38px; height:38px; border-radius:50%; border:none; background:var(--card); color:var(--ink); display:flex; align-items:center; justify-content:center; padding:0; cursor:pointer; box-shadow:var(--shadow);\">\n      <sc-if value=\"{{ isDark }}\" hint-placeholder-val=\"{{ false }}\">\n        <svg viewBox=\"0 0 24 24\" style=\"width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\"><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"4.5\"><\u002Fline><line x1=\"12\" y1=\"19.5\" x2=\"12\" y2=\"22\"><\u002Fline><line x1=\"2\" y1=\"12\" x2=\"4.5\" y2=\"12\"><\u002Fline><line x1=\"19.5\" y1=\"12\" x2=\"22\" y2=\"12\"><\u002Fline><line x1=\"4.9\" y1=\"4.9\" x2=\"6.6\" y2=\"6.6\"><\u002Fline><line x1=\"17.4\" y1=\"17.4\" x2=\"19.1\" y2=\"19.1\"><\u002Fline><line x1=\"4.9\" y1=\"19.1\" x2=\"6.6\" y2=\"17.4\"><\u002Fline><line x1=\"17.4\" y1=\"6.6\" x2=\"19.1\" y2=\"4.9\"><\u002Fline><\u002Fsvg>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isLight }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg viewBox=\"0 0 24 24\" style=\"width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\"><path d=\"M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fsc-if>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Hero\" style=\"max-width:720px; margin:0 auto; padding:22px 20px 6px;\">\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;\">\n      <span style=\"display:inline-block; background:var(--chipbg); color:var(--soft); font-size:11.5px; font-weight:700; padding:7px 14px; border-radius:999px;\">Your ballot · Nov 3, 2026 · ranked-choice voting<\u002Fspan>\n      <a href=\"https://vote.org\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; background:var(--goldbg); color:var(--gold); font-size:11.5px; font-weight:800; padding:7px 14px; border-radius:999px; text-decoration:none; white-space:nowrap;\">How to vote →<\u002Fa>\n    <\u002Fdiv>\n    <h1 style=\"font-weight:800; font-size:clamp(28px,6vw,38px); line-height:1.12; letter-spacing:-.02em; margin:16px 0 10px;\">Maine - United States Senate<\u002Fh1>\n    <p style=\"font-size:15px; line-height:1.6; color:var(--soft); margin:0; max-width:520px;\">⭐ This is one of seven races that will determine control of the Senate! <a role=\"button\" tabindex=\"0\" onclick=\"{{ scrollToNarrative }}\" style=\"color:var(--gold); font-weight:700; text-decoration:none; cursor:pointer; white-space:nowrap;\">Get caught up ↓<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Candidates\" style=\"max-width:720px; margin:0 auto; padding:20px 20px 0; display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px;\">\n    <div style=\"background:var(--card); border-radius:22px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);\">\n      <img src=\"daab7339-6d6d-4f25-be36-0a1460054172\" alt=\"Graham Platner\" style=\"width:104px; height:104px; margin:0 auto 12px; display:block; border-radius:50%; overflow:hidden; object-fit:cover; background:var(--bluebg);\">\n      <div style=\"font-weight:800; font-size:18px;\">Graham Platner<\u002Fdiv>\n      <div style=\"display:inline-block; margin-top:7px; background:var(--bluebg); color:var(--blue); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px;\">Democrat - Age: 41<\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Oyster farmer, harbor master, and Marine &amp; Army veteran from Sullivan. First run for office.<\u002Fp>\n      <a href=\"https://www.grahamforsenate.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--blue); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);\">\n      <img src=\"03958a8d-dd1d-483c-9cb4-8961330fee97\" alt=\"Susan Collins\" style=\"width:104px; height:104px; margin:0 auto 12px; display:block; border-radius:50%; overflow:hidden; object-fit:cover; background:var(--redbg);\">\n      <div style=\"font-weight:800; font-size:18px;\">Susan Collins<\u002Fdiv>\n      <div style=\"display:inline-block; margin-top:7px; background:var(--redbg); color:var(--red); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px;\">Republican - Age: 73<\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">U.S. senator since 1997, seeking a sixth term. Chairs the committee that controls federal spending.<\u002Fp>\n      <a href=\"https://www.susancollins.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--red); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Polling\" style=\"max-width:720px; margin:0 auto; padding:14px 20px 0;\">\n    <div style=\"background:var(--card); border-radius:22px; padding:20px 20px 22px; box-shadow:var(--shadow);\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; gap:10px; flex-wrap:wrap;\">\n        <span style=\"font-weight:800; font-size:16px;\">Who's ahead?<\u002Fspan>\n        <span style=\"font-size:11px; font-weight:700; color:var(--gold); background:var(--goldbg); padding:5px 12px; border-radius:999px;\">TOSS-UP<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:10px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--blue);\">Platner<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:47.5%; height:100%; background:linear-gradient(90deg,var(--blue2),var(--blue)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--blue);\">47.5<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--red);\">Collins<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:46.8%; height:100%; background:linear-gradient(90deg,var(--red2),var(--red)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--red);\">46.8<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:12px;\">\n        <a href=\"https://www.realclearpolling.com/polls/senate/general/2026/maine/collins-vs-platner\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:11px; color:var(--faint); text-decoration:none;\">Average of recent public polls (RCP) →<\u002Fa>\n        <span style=\"font-size:11px; color:var(--faint);\">As of July 1<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Where they stand\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 4px;\">Where they stand<\u002Fh2>\n    <p style=\"font-size:13.5px; color:var(--soft); margin:0 0 14px;\">Tap a topic that's important to you.<\u002Fp>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n      <sc-for list=\"{{ topicChips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n        <button type=\"button\" onclick=\"{{ chip.click }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--blue2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:7px;\">PLATNER SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ gpSays }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--red2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:7px;\">COLLINS SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ scSays }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Money check\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"background:var(--greenbg); border-radius:22px; padding:20px 22px;\">\n      <div style=\"font-size:15px; font-weight:800; color:var(--green); margin-bottom:4px;\">✓ Money &amp; integrity check<\u002Fdiv>\n      <p style=\"font-size:12.5px; color:var(--soft); margin:0 0 12px;\">How each candidate handles money in politics.<\u002Fp>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Ban Congress from trading stocks<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">GP yes<\u002Fspan> · <span style=\"color:var(--bad);\">SC no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Takes corporate PAC money<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">GP no<\u002Fspan> · <span style=\"color:var(--bad);\">SC yes<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Wants to overturn Citizens United<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">GP yes<\u002Fspan> · <span style=\"color:var(--bad);\">SC no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Follow the money: billionaire donors have given ~$9.8M supporting Collins; small-dollar donors (under $200) have given ~$9.6M to Platner. <span style=\"color:var(--faint);\">— Maine Monitor, June 2026<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"What they'd do\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their big promises<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">PLATNER'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Take on billionaires &amp; corruption<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Overturn Citizens United, ban congressional stock trading, tax wealth over $1 billion.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Health care for all<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Medicare for All, plus rescue funding for Maine's rural hospitals.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Housing &amp; wages<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Affordable homes for working Mainers; stronger unions for better pay.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">COLLINS'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Seniority that delivers<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">As spending-committee chair, steer federal money to Maine's hospitals, shipyards, and towns.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Bipartisan problem-solving<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">A record of working across the aisle — including breaking with her party on the Iran war.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Lowering costs<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Extend health-insurance subsidies with limits; heating help; end shutdown standoffs.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Agree or differ\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;\">\n      <h2 style=\"font-weight:800; font-size:21px; margin:0;\">Agree or differ?<\u002Fh2>\n      <div style=\"display:flex; gap:6px;\">\n        <button type=\"button\" onclick=\"{{ setAll }}\" style=\"{{ chipAll }}\">All<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setAgree }}\" style=\"{{ chipAgree }}\">Agree<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setDiffer }}\" style=\"{{ chipDiffer }}\">Differ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-vf=\"{{ voteFilter }}\" style=\"background:var(--card); border-radius:22px; padding:6px 20px; box-shadow:var(--shadow);\">\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Ban the sale of assault-style weapons<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Platner: supports a ban · Collins: voted against a ban and magazine limits in 2013, hasn't reversed<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Expand background checks &amp; red-flag funding<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Collins voted for the 2022 Bipartisan Safer Communities Act · Platner backs similar measures<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Continued U.S. military aid to Ukraine<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Collins has pushed for Ukraine aid from Appropriations · Platner, a combat veteran, backs continued support<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Dismantle ICE<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Platner: yes, calls for ending \"the mass deportation machine\" · Collins: opposes<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">A minimum tax on billionaires<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Platner: yes, a wealth-tax floor · Collins: opposes new wealth taxes<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0;\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Federal support for Maine's working waterfront<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Both support it<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Their stories\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their stories<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">GRAHAM PLATNER<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">1984<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Born in Blue Hill; raised in Sullivan, Downeast Maine.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2000s<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Marine Corps infantryman, then Army, with overseas deployments.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2010s<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Came home to run an oyster farm; serves as harbor master.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won the Democratic primary with 72% after Gov. Mills stepped aside.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">SUSAN COLLINS<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">1996<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">First elected to the Senate from Caribou, northern Maine.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2020<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won a fifth term by 9 points, defying every public poll.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2025<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Became chair of the Appropriations Committee; has never missed a roll-call vote.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Cast the first GOP vote to require congressional approval for the Iran war.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"The narrative\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 ref=\"{{ narrativeRef }}\" style=\"{{ narrativeHeadingStyle }}\">The backstory<\u002Fh2>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:14px; font-size:14px; line-height:1.7;\">\n      <p style=\"margin:0;\">Here's the short version: Susan Collins has been Maine's senator since 1997 and has never lost. She's the only Republican senator left defending a state that voted Democratic in 2024, which makes this seat one of Democrats' best pickup chances anywhere. Everyone expected a marquee fight — most assumed against Governor Janet Mills.<\u002Fp>\n      <p style=\"margin:0;\">Instead, the story of this race is Graham Platner — an oyster farmer and Marine veteran nobody had heard of a year ago. He launched in August 2025 running as an anti-oligarchy populist, picked up endorsements from Bernie Sanders and Elizabeth Warren, and built such a grassroots wave that Mills dropped out of the primary in April.<\u002Fp>\n      <p style=\"margin:0;\">It hasn't been smooth. Platner's campaign got hit with a string of personal controversies — a Nazi-linked tattoo he says he didn't understand, old online posts, and reporting on his personal conduct that had national Democrats openly nervous. He denied the worst of it, refused to drop out, and Maine's primary voters shrugged: he won the nomination easily on June 9.<\u002Fp>\n      <p style=\"margin:0;\">Now the polls show a genuine toss-up, with most surveys giving Platner a slight edge — and everyone remembers Collins trailed every public poll in 2020 and won by nine. Her case: her Appropriations chairmanship delivers for Maine. His case: the election is a referendum on Trump, and Collins enables him. Control of the Senate could come down to this one.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:720px; margin:0 auto; padding:28px 20px 44px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6;\">\n    Positions summarized from campaign websites, voting records, and news reports · July 2026<br>\n    electy.org is in beta — expect rough edges as we build out every race.<br>\n    <a href=\"contact.html\" style=\"display:inline-block; margin-top:10px; font-size:11.5px; font-weight:800; color:var(--soft); background:var(--card); padding:8px 16px; border-radius:999px; box-shadow:var(--shadow); text-decoration:none;\">Contact us<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'light', topic: 'Cost of Living', voteFilter: 'all', pulse: false };\n  narrativeRef = React.createRef();\n\n  componentWillUnmount(){\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n  }\n\n  scrollToNarrative = () => {\n    const el = this.narrativeRef.current;\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 24;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n    this._pulseStart = setTimeout(() => {\n      this.setState({ pulse: true });\n      this._pulseEnd = setTimeout(() => this.setState({ pulse: false }), 1300);\n    }, 550);\n  };\n\n  static TOPICS = [\n    { label: 'Cost of Living',\n      gp: 'Focus on housing, wages, and hospital access. Small businesses shouldn\\u2019t pay higher tax rates than multinational corporations.',\n      sc: 'Points to spending wins for Maine — heating assistance, rural hospitals, shipyard jobs — and blames shutdown standoffs for economic pain.' },\n    { label: 'Iran War',\n      gp: 'End U.S. involvement — he calls it a \"pointless war\" fought for defense contractors, and has made ending it the centerpiece of his campaign.',\n      sc: 'Continue only with a clear mission and Congress\\u2019s sign-off. She was the first Republican to vote to require congressional authorization — but hasn\\u2019t called for ending it outright.' },\n    { label: 'Healthcare',\n      gp: 'Medicare for All, plus emergency support to keep Maine\\u2019s rural hospitals open.',\n      sc: 'Extend ACA insurance subsidies for a limited period with income caps — but voted against a bill tying a permanent extension to ending the shutdown.' },\n    { label: 'Housing',\n      gp: 'A top-tier issue: more homes for working Mainers, not out-of-state speculators.',\n      sc: 'Backs federal housing programs and tax credits she has funded through the Appropriations Committee.' },\n    { label: 'Immigration',\n      gp: 'Calls mass-deportation operations \"unconscionable\"; supports a path to citizenship.',\n      sc: 'Border security plus legal-immigration reform for Maine\\u2019s seasonal workforce.' },\n    { label: 'Abortion',\n      gp: 'Supports abortion rights and codifying Roe v. Wade into federal law.',\n      sc: 'Describes herself as pro-choice and wrote her own bill to codify Roe — but voted to confirm justices who overturned it.' },\n  ];\n\n  renderVals(){\n    const theme = this.state.theme;\n    const active = Component.TOPICS.find(t => t.label === this.state.topic) || Component.TOPICS[0];\n\n    const chipBase = \"font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; border:none; cursor:pointer;\";\n    const topicChips = Component.TOPICS.map(t => ({\n      label: t.label,\n      style: chipBase + (t.label === active.label\n        ? ' background:var(--ink); color:var(--bg);'\n        : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);'),\n      click: () => this.setState({ topic: t.label }),\n    }));\n\n    const f = this.state.voteFilter;\n    const vChip = (on) => chipBase + (on ? ' background:var(--ink); color:var(--bg);' : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);');\n\n    return {\n      theme,\n      isDark: theme === 'dark',\n      isLight: theme !== 'dark',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n\n      topicChips,\n      gpSays: active.gp,\n      scSays: active.sc,\n\n      voteFilter: f,\n      chipAll: vChip(f === 'all'),\n      chipAgree: vChip(f === 'agree'),\n      chipDiffer: vChip(f === 'differ'),\n      setAll: () => this.setState({ voteFilter: 'all' }),\n      setAgree: () => this.setState({ voteFilter: 'agree' }),\n      setDiffer: () => this.setState({ voteFilter: 'differ' }),\n\n      scrollToNarrative: this.scrollToNarrative,\n      narrativeRef: this.narrativeRef,\n      narrativeHeadingStyle: \"font-weight:800; font-size:21px; margin:0 0 14px; display:inline-block; padding:4px 10px; margin-left:-10px; border-radius:10px;\" + (this.state.pulse ? \" animation:narrativePulse 1.3s ease;\" : \"\"),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
