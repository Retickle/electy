  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ding:20px 22px;\">\n      <div style=\"font-size:15px; font-weight:800; color:var(--green);\">✓ Money &amp; integrity check<\u002Fdiv>\n      <p style=\"font-size:12.5px; color:var(--soft); margin:4px 0 12px;\">How each candidate handles money in politics.<\u002Fp>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Ban Congress from trading stocks<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">CP yes<\u002Fspan> · <span style=\"color:var(--faint);\">JS unclear<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Takes corporate PAC money<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">CP no<\u002Fspan> · <span style=\"color:var(--bad);\">JS yes<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Wants to overturn Citizens United<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">CP yes<\u002Fspan> · <span style=\"color:var(--bad);\">JS no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Follow the money: national Republican super PACs have put $17M+ behind Sununu; most of Pappas's haul comes from individual donors, roughly half of it small-dollar (under $200). <span style=\"color:var(--faint);\">— FEC filings &amp; The Center Square, 2026<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"What they'd do\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their big promises<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">PAPPAS'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Lower everyday costs<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Cap drug prices, expand the child tax credit, and crack down on price gouging.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Build more housing<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Federal incentives to build starter homes; limits on corporate investors buying up NH housing.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Protect rights<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Codify Roe into federal law and defend marriage equality.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">SUNUNU'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Rein in Washington spending<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Cut deficits and block any new broad-based taxes — federal or state.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Grow the economy<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Cut regulation and permitting delays for housing, energy, and small business.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Experienced, independent voice<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Runs on his Senate record and engineer's pragmatism over party-line politics.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Agree or differ\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;\">\n      <h2 style=\"font-weight:800; font-size:21px; margin:0;\">Agree or differ?<\u002Fh2>\n      <div style=\"display:flex; gap:6px;\">\n        <button type=\"button\" onclick=\"{{ setAll }}\" style=\"{{ chipAll }}\">All<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setAgree }}\" style=\"{{ chipAgree }}\">Agree<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setDiffer }}\" style=\"{{ chipDiffer }}\">Differ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-vf=\"{{ voteFilter }}\" style=\"background:var(--card); border-radius:22px; padding:6px 20px; box-shadow:var(--shadow);\">\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Continued U.S. military aid to Ukraine<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Pappas has voted for every aid package · Sununu e in the Senate<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Private accounts for Social Security<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Sununu: backed personal accounts in 2005, wants to \"modernize\" · Pappas: opposes any privatization<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0;\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Federal support for Portsmouth Naval Shipyard<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Both support it<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Their stories\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their stories<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var( color:var(--soft);\">Born into NH's best-known political family; MIT-trained engineer.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">1996<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Elected to the U.S. House; served three terms.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2002<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won this Senate seat at 38 — then lost it to Jeanne Shaheen in 2008.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Seeking his old seat back, 18 years later, as the GOP establishment favorite.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"The narrative\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 ref=\"{{ narrativeRef }}\" style=\"{{ narrativeHeadingStyle }}\">The backstory<\u002Fh2>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px; box-shadow:var(--shadow); font-size:14px; line-height:1.7;\">\n      <p style=\"margin:0;\">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:720px; margin:0 auto; padding:28px 20px 44px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6;\">\n    Positions summarized from campaign websites, voting records, and news reports · July 2026<br>\n    electy.org is in beta — expect rough edges as we build out every race.<br>\n    <a href=\"Contact.dc.html\" style=\"display:inline-block; margin-top:10px; font-size:11.5px; font-weight:800; color:var(--soft); background:var(--card); padding:8px 16px; border-radius:999px; box-shadow:var(--shadow); text-decoration:none;\">Contact us<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'light', topic: 'Cost of Living', voteFilter: 'all', pulse: false };\n  narrativeRef = React.createRef();\n\n  componentWillUnmount(){\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n  }\n\n  scrollToNarrative = () => {\n    const el = this.narrativeRef.current;\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 24;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n    this._pulseStart = setTimeout(() => {\n      this.setState({ pulse: true });\n      this._pulseEnd = setTimeout(() => this.setState({ pulse: false }), 1300);\n    }, 550);\n  };\n\n  static TOPICS = [\n    { label: 'Cost of Living',\n      cp: 'Cap prescription prices, expand the child tax credit, and crack down on corporate price gouging driving up grocery and energy bills.',\n      js: 'Inflation comes from Washington overspending — cut deficits and regulation, and block any new broad-based taxes.' },\n    { label: 'Iran War',\n      cp: 'Opposes an open-ended war; says Congress — not the president — must authorize any further military action.',\n      js: 'Backs a hard line on Iran\\u2019s nuclear program but says any long commitment needs a clear mission and exit plan.' },\n    { label: 'Healthcare',\n      cp: 'Protect the ACA and extend insurance subsidies; expand Medicare\\u2019s power to negotiate drug prices.',\n      js: 'Market-based reform: more competition and price transparency instead of new federal programs.' },\n    { label: 'Housing',\n      cp: 'A top NH issue: federal incentives to build starter homes, plus limits on corporate investors buying up housing.',\n      js: 'Cut the regulations and permitting delays that make it too slow and costly to build in New Hampshire.' },\n    { label: 'Immigration',\n      cp: 'Tougher border security paired with legal pathways; opposes mass-deportation raids.',\n      js: 'Secure the border first; supports expanded legal immigration for New Hampshire\\u2019s workforce.' },\n    { label: 'Abortion',\n      cp: 'Supports abortion rights and codifying Roe v. Wade into federal law.',\n      js: 'Describes himself as pro-life; says abortion law should be left to the states, opposes a federal ban.' },\n  ];\n\n  renderVals(){\n    const theme = this.state.theme;\n    const active = Component.TOPICS.find(t => t.label === this.state.topic) || Component.TOPICS[0];\n\n    const chipBase = \"font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; border:none; cursor:pointer;\";\n    const topicChips = Component.TOPICS.map(t => ({\n      label: t.label,\n      style: chipBase + (t.label === active.label\n        ? ' background:var(--ink); color:var(--bg);'\n        : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);'),\n      click: () => this.setState({ topic: t.label }),\n    }));\n\n    const f = this.state.voteFilter;\n    const vChip = (on) => chipBase + (on ? ' background:var(--ink); color:var(--bg);' : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);');\n\n    return {\n      theme,\n      isDark: theme === 'dark',\n      isLight: theme !== 'dark',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n\n      topicChips,\n      cpSays: active.cp,\n      jsSays: active.js,\n\n      voteFilter: f,\n      chipAll: vChip(f === 'all'),\n      chipAgree: vChip(f === 'agree'),\n      chipDiffer: vChip(f === 'differ'),\n      setAll: () => this.setState({ voteFilter: 'all' }),\n      setAgree: () => this.setState({ voteFilter: 'agree' }),\n      setDiffer: () => this.setState({ voteFilter: 'differ' }),\n\n      scrollToNarrative: this.scrollToNarrative,\n      narrativeRef: this.narrativeRef,\n      narrativeHeadingStyle: \"font-weight:800; font-size:21px; margin:0 0 14px; display:inline-block; padding:4px 10px; margin-left:-10px; border-radius:10px;\" + (this.state.pulse ? \" animation:narrativePulse 1.3s ease;\" : \"\"),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
