<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/png" href="favicon.png">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  :root{
    --bg:#F6F4EF; --card:#FFFFFF; --ink:#23201A; --soft:#6B6455; --faint:#A39B89;
    --chipbg:#E8E3D8; --line:#ECE7DC;
    --gold:#B4832E; --goldbg:#F7ECD7;
    --shadow:0 6px 18px -12px rgba(35,32,26,.3);
  }
  [data-theme="dark"]{
    --bg:#15171C; --card:#212429; --ink:#F0EDE6; --soft:#A6AAB4; --faint:#6E7280;
    --chipbg:#2B2E35; --line:#2E323A;
    --gold:#D9B26A; --goldbg:#37301F;
    --shadow:0 8px 22px -12px rgba(0,0,0,.6);
  }
</style>
</helmet>

<div data-theme="{{ theme }}" style="min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Plus Jakarta Sans',sans-serif; -webkit-font-smoothing:antialiased; transition:background-color .25s ease, color .25s ease;">

  <div data-screen-label="Header" style="max-width:840px; margin:0 auto; padding:18px 20px 0; display:flex; align-items:center; justify-content:space-between; gap:12px;">
    <a href="index.html" style="display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit;">
      <img src="favicon.svg" alt="electy.org logo" style="width:26px; height:26px; display:block;">
      <span style="font-weight:800; font-size:17px; letter-spacing:-.01em;">electy<span style="color:var(--gold);">.org</span></span>
      <span style="font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--gold); background:var(--goldbg); padding:3px 8px; border-radius:999px;">BETA</span>
    </a>
    <div style="display:flex; align-items:center; gap:10px;">
      <button type="button" onClick="{{ toggleTheme }}" aria-label="Toggle dark mode" style="width:38px; height:38px; border-radius:50%; border:none; background:var(--card); color:var(--ink); display:flex; align-items:center; justify-content:center; padding:0; cursor:pointer; box-shadow:var(--shadow);">
        <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}">
          <svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="12" r="4.5"></circle><line x1="12" y1="2" x2="12" y2="4.5"></line><line x1="12" y1="19.5" x2="12" y2="22"></line><line x1="2" y1="12" x2="4.5" y2="12"></line><line x1="19.5" y1="12" x2="22" y2="12"></line><line x1="4.9" y1="4.9" x2="6.6" y2="6.6"></line><line x1="17.4" y1="17.4" x2="19.1" y2="19.1"></line><line x1="4.9" y1="19.1" x2="6.6" y2="17.4"></line><line x1="17.4" y1="6.6" x2="19.1" y2="4.9"></line></svg>
        </sc-if>
        <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}">
          <svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z"></path></svg>
        </sc-if>
      </button>
    </div>
  </div>

  <div style="max-width:560px; margin:0 auto; padding:60px 20px 80px; text-align:center;">
    <div style="display:inline-block; font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px; margin-bottom:16px;">BETA</div>
    <h1 style="font-weight:800; font-size:clamp(26px,5vw,34px); line-height:1.15; letter-spacing:-.02em; margin:0 0 12px;">Contact us</h1>
    <p style="font-size:14px; line-height:1.6; color:var(--soft); margin:0;">This page is coming soon.</p>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { theme: (function(){ try { return localStorage.getItem('electy-theme') || 'light'; } catch(e){ return 'light'; } })() };
  renderVals(){
    const theme = this.state.theme;
    return {
      theme,
      isDark: theme === 'dark',
      isLight: theme !== 'dark',
      toggleTheme: () => this.setState(s => { const t = s.theme === 'dark' ? 'light' : 'dark'; try { localStorage.setItem('electy-theme', t); } catch(e){} return { theme: t }; }),
    };
  }
}
</script>
</body>
</html>
