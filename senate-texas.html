  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

iv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Texas state representative since 2018 and former middle-school teacher. Degrees from UT Austin and Harvard.<\u002Fp>\n      <a href=\"https://talaricofortexas.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--blue); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);\">\n      <img src=\"b9ea50a3-aca7-4643-b9e8-33cfd78b98d0\" alt=\"Ken Paxton\" style=\"width:104px; height:104px; margin:0 auto 12px; display:block; border-radius:50%; overflow:hidden; object-fit:cover; background:var(--redbg);\">\n      <div style=\"font-weight:800; font-size:18px;\">Ken Paxton<\u002Fdiv>\n      <div style=\"display:inline-block; margin-top:7px; background:var(--redbg); color:var(--red); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px;\">Republican - Age: 63<\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Attorney General of Texas since 2015, after serving in the Texas House and Senate. Beat Sen. Cornyn in the primary.<\u002Fp>\n      <a href=\"https://kenpaxton.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--red); text-decoration:none;\">Campaign website →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Polling\" style=\"max-width:720px; margin:0 auto; padding:14px 20px 0;\">\n    <div style=\"background:var(--card); border-radius:22px; padding:20px 20px 22px; box-shadow:var(--shadow);\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; gap:10px; flex-wrap:wrap;\">\n        <span style=\"font-weight:800; font-size:16px;\">Who's ahead?<\u002Fspan>\n        <span style=\"font-size:11px; font-weight:700; color:var(--gold); background:var(--goldbg); padding:5px 12px; border-radius:999px;\">TOSS-UP<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:10px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--blue);\">Talarico<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:47%; height:100%; background:linear-gradient(90deg,var(--blue2),var(--blue)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--blue);\">47<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <span style=\"flex:0 0 62px; font-size:12.5px; font-weight:700; color:var(--red);\">Paxton<\u002Fspan>\n        <div style=\"flex:1; height:24px; background:var(--track); border-radius:999px; overflow:hidden;\"><div style=\"width:47%; height:100%; background:linear-gradient(90deg,var(--red2),var(--red)); border-radius:999px; transform-origin:left; animation:barGrow .8s ease;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 44px; text-align:right; font-size:15px; font-weight:800; color:var(--red);\">47<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:12px;\">\n        <a href=\"https://www.nytimes.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:11px; color:var(--faint); text-decoration:none;\">NYT/Siena poll · 812 likely voters · ±3.5 pts →<\u002Fa>\n        <span style=\"font-size:11px; color:var(--faint);\">June 19-27<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Where they stand\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 4px;\">Where they stand<\u002Fh2>\n    <p style=\"font-size:13.5px; color:var(--soft); margin:0 0 14px;\">Tap a topic — including today's big ones.<\u002Fp>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n      <sc-for list=\"{{ topicChips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n        <button type=\"button\" onclick=\"{{ chip.click }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--blue2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:7px;\">TALARICO SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ jtSays }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:18px 20px; border-left:5px solid var(--red2); box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:7px;\">PAXTON SAYS<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">{{ kpSays }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Money check\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"background:var(--greenbg); border-radius:22px; padding:20px 22px;\">\n      <div style=\"font-size:15px; font-weight:800; color:var(--green); margin-bottom:4px;\">✓ Money &amp; integrity check<\u002Fdiv>\n      <p style=\"font-size:12.5px; color:var(--soft); margin:0 0 12px;\">How each candidate handles money in politics.<\u002Fp>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Ban Congress from trading stocks<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JT yes<\u002Fspan> · <span style=\"color:var(--bad);\">KP no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Takes corporate PAC money<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JT no<\u002Fspan> · <span style=\"color:var(--bad);\">KP yes<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:13.5px; padding:10px 0; border-top:1px solid var(--line);\">\n        <span>Wants to overturn Citizens United<\u002Fspan>\n        <span style=\"font-weight:800; white-space:nowrap;\"><span style=\"color:var(--green);\">JT yes<\u002Fspan> · <span style=\"color:var(--bad);\">KP no<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; line-height:1.6; color:var(--soft); margin:12px 0 0;\">Follow the money: Talarico's viral online following has made him one of the country's top small-dollar fundraisers; Paxton draws more on large donors and PAC support.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"What they'd do\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their big promises<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">TALARICO'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Corruption &amp; democracy<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Stronger ethics rules, transparency for officeholders, and protecting Texans' access to the ballot.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Taxes &amp; cost of living<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Property-tax relief for homeowners and capping rising grocery, housing, and healthcare costs.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Public education<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">A former public-school teacher; supports raising teacher pay and increasing per-student funding.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">PAXTON'S TOP 3<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Supporting Trump's agenda<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Aligned with the administration on border security, energy production, and federal spending cuts.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Taking on Big Food and Big Pharma<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Lower prescription-drug costs and curb harmful additives in the food supply.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700; font-size:14px; margin-bottom:3px;\">Border security<\u002Fdiv><div style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Continued state and federal funding for border-enforcement operations.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Agree or differ\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;\">\n      <h2 style=\"font-weight:800; font-size:21px; margin:0;\">Agree or differ?<\u002Fh2>\n      <div style=\"display:flex; gap:6px;\">\n        <button type=\"button\" onclick=\"{{ setAll }}\" style=\"{{ chipAll }}\">All<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setAgree }}\" style=\"{{ chipAgree }}\">Agree<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setDiffer }}\" style=\"{{ chipDiffer }}\">Differ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-vf=\"{{ voteFilter }}\" style=\"background:var(--card); border-radius:22px; padding:6px 20px; box-shadow:var(--shadow);\">\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Lower prescription drug prices<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Both support it — a rare shared priority<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"agree\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Property tax relief for homeowners<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Both back it<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--green); background:var(--greenbg); padding:4px 10px; border-radius:999px;\">AGREE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">New federal emissions mandates<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Talarico: supports · Paxton: opposes, prioritizes oil and gas production<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);\">\n        <div><div style=\"font-size:14px; font-weight:600;\">School vouchers<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Talarico: the ex-teacher is a leading voucher opponent · Paxton: champions school choice<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"voteRow\" data-cat=\"differ\" style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0;\">\n        <div><div style=\"font-size:14px; font-weight:600;\">Was the 2020 election legitimate?<\u002Fdiv><div style=\"font-size:12px; color:var(--soft); margin-top:2px;\">Talarico: yes · Paxton: sued to overturn the results in four states<\u002Fdiv><\u002Fdiv>\n        <span style=\"flex:0 0 auto; font-size:10.5px; font-weight:800; color:var(--gold); background:var(--goldbg); padding:4px 10px; border-radius:999px;\">DIFFER<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Their stories\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 style=\"font-weight:800; font-size:21px; margin:0 0 14px;\">Their stories<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px;\">\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.04em; margin-bottom:12px;\">JAMES TALARICO<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">1989<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Born in Austin; raised by a single mom in Round Rock.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2010s<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Taught middle school on San Antonio's West Side; later studied at Harvard and in seminary.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2018<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Elected to the Texas House at 29; helped pass the 2019 school-finance overhaul.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2025<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Became a national figure through viral videos on faith and politics.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--blue);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Won the Democratic nomination for U.S. Senate.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow);\">\n        <div style=\"font-size:11px; font-weight:800; color:var(--red); letter-spacing:.04em; margin-bottom:12px;\">KEN PAXTON<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2002<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Elected to the Texas House from McKinney; later to the Texas Senate.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2015<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Became Attorney General of Texas.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2020<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Led the lawsuit asking the Supreme Court to overturn election results in four states.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2023<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Impeached by the GOP-led Texas House over corruption allegations; acquitted by the Senate.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"flex:0 0 44px; font-size:12px; font-weight:800; color:var(--red);\">2026<\u002Fspan><span style=\"font-size:12.5px; line-height:1.55; color:var(--soft);\">Defeated Sen. John Cornyn in the Republican primary.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"The backstory\" style=\"max-width:720px; margin:0 auto; padding:28px 20px 0;\">\n    <h2 ref=\"{{ narrativeRef }}\" style=\"{{ narrativeHeadingStyle }}\">The backstory<\u002Fh2>\n    <div style=\"background:var(--card); border-radius:22px; padding:22px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:14px; font-size:14px; line-height:1.7;\">\n      <p style=\"margin:0;\">Here's the short version: no Democrat has won statewide in Texas since 1994, and this seat has been Republican for decades. It was supposed to be Sen. John Cornyn's to defend — until Ken Paxton, the state's hard-right attorney general, challenged him in the primary and won, turning a safe seat into an open brawl.<\u002Fp>\n      <p style=\"margin:0;\">Paxton comes with baggage: he was impeached by his own party's Texas House over corruption allegations (the Senate acquitted him), spent nearly a decade under securities-fraud charges before a 2024 deal ended them, and led the failed lawsuit to overturn the 2020 election. National Republicans privately worried he'd be the one Republican who could actually lose Texas.<\u002Fp>\n      <p style=\"margin:0;\">On the other side, Democrats nominated James Talarico — a 37-year-old former middle-school teacher and seminary student whose viral videos about faith and politics made him a small-dollar fundraising phenomenon. He's betting a preacher's message and an anti-corruption pitch can do what no Texas Democrat has done in three decades.<\u002Fp>\n      <p style=\"margin:0;\">And the polls say it's working, so far: the latest NYT/Siena survey has the race deadlocked at 47-47 — a true dead heat, and shocking for Texas. Forecasters call it a toss-up. If Democrats actually flip this seat, the fight for the Senate is probably over.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:720px; margin:0 auto; padding:28px 20px 44px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6;\">\n    Positions summarized from campaign websites, voting records, and news reports · July 2026<br>\n    electy.org is in beta — expect rough edges as we build out every race.<br>\n    <a href=\"contact.html\" style=\"display:inline-block; margin-top:10px; font-size:11.5px; font-weight:800; color:var(--soft); background:var(--card); padding:8px 16px; border-radius:999px; box-shadow:var(--shadow); text-decoration:none;\">Contact us<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'light', topic: 'Cost of Living', voteFilter: 'all', pulse: false };\n  narrativeRef = React.createRef();\n\n  componentWillUnmount(){\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n  }\n\n  scrollToNarrative = () => {\n    const el = this.narrativeRef.current;\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 24;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n    if (this._pulseStart) clearTimeout(this._pulseStart);\n    if (this._pulseEnd) clearTimeout(this._pulseEnd);\n    this._pulseStart = setTimeout(() => {\n      this.setState({ pulse: true });\n      this._pulseEnd = setTimeout(() => this.setState({ pulse: false }), 1300);\n    }, 550);\n  };\n\n  static TOPICS = [\n    { label: 'Cost of Living',\n      jt: 'Property-tax relief for homeowners and capping rising grocery, housing, and healthcare costs. Small businesses shouldn\\u2019t pay more than multinationals.',\n      kp: 'Tax relief and reduced regulation are the path to lowering costs; backs the administration\\u2019s energy-production push to bring prices down.' },\n    { label: 'Iran War',\n      jt: 'Congress must approve any further military action; favors renewed diplomatic engagement over an open-ended commitment.',\n      kp: 'Peace through strength \\u2014 backs the administration\\u2019s posture and emphasizes deterrence against Iran\\u2019s nuclear program.' },\n    { label: 'Healthcare',\n      jt: 'Expand access to affordable coverage for rural and uninsured Texans; supports expanding Medicaid in Texas.',\n      kp: 'Blames rising costs on over-regulation; wants price transparency and more private-market competition. Opposes Medicaid expansion.' },\n    { label: 'Housing',\n      jt: 'Housing affordability is a top cost-of-living priority \\u2014 cap rising housing costs and build more homes for working Texans.',\n      kp: 'Lower housing costs by reducing regulation on builders and speeding up construction approvals.' },\n    { label: 'Immigration',\n      jt: 'Orderly, humane enforcement paired with a workable path to legal status for long-time residents.',\n      kp: 'Border security first: continued state and federal funding for enforcement operations and stricter limits on unlawful crossings.' },\n    { label: 'Abortion',\n      jt: 'Supports restoring abortion access and opposes Texas\\u2019s near-total ban.',\n      kp: 'Staunchly anti-abortion \\u2014 as attorney general he defended and enforced Texas\\u2019s near-total ban.' },\n  ];\n\n  renderVals(){\n    const theme = this.state.theme;\n    const active = Component.TOPICS.find(t => t.label === this.state.topic) || Component.TOPICS[0];\n\n    const chipBase = \"font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; border:none; cursor:pointer;\";\n    const topicChips = Component.TOPICS.map(t => ({\n      label: t.label,\n      style: chipBase + (t.label === active.label\n        ? ' background:var(--ink); color:var(--bg);'\n        : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);'),\n      click: () => this.setState({ topic: t.label }),\n    }));\n\n    const f = this.state.voteFilter;\n    const vChip = (on) => chipBase + (on ? ' background:var(--ink); color:var(--bg);' : ' background:var(--card); color:var(--soft); box-shadow:var(--shadow);');\n\n    return {\n      theme,\n      isDark: theme === 'dark',\n      isLight: theme !== 'dark',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n\n      topicChips,\n      jtSays: active.jt,\n      kpSays: active.kp,\n\n      voteFilter: f,\n      chipAll: vChip(f === 'all'),\n      chipAgree: vChip(f === 'agree'),\n      chipDiffer: vChip(f === 'differ'),\n      setAll: () => this.setState({ voteFilter: 'all' }),\n      setAgree: () => this.setState({ voteFilter: 'agree' }),\n      setDiffer: () => this.setState({ voteFilter: 'differ' }),\n\n      scrollToNarrative: this.scrollToNarrative,\n      narrativeRef: this.narrativeRef,\n      narrativeHeadingStyle: \"font-weight:800; font-size:21px; margin:0 0 14px; display:inline-block; padding:4px 10px; margin-left:-10px; border-radius:10px;\" + (this.state.pulse ? \" animation:narrativePulse 1.3s ease;\" : \"\"),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
